# KAI-428 — Build pipeline
#
# Cross-platform Go build matrix for the Kaivue Recording Server.
# Augments (does NOT replace) release.yml / nightly_binaries.yml, which still
# drive the official release tarballs via `make binaries`. This workflow
# produces per-target binaries with reproducible build flags so they can be
# consumed by the supply-chain workflow (SBOM + cosign) and by the
# reproducibility-check workflow.
#
# Acceptance criteria addressed (KAI-428):
#   * GitHub Actions matrix: linux/amd64 (narrowed — see MATRIX NOTE below)
#   * Reproducible build flags: -trimpath, -buildvcs=true, ldflags strip paths
#   * Per-target artifact upload
#
# MATRIX NOTE (2026-04-08): The matrix is temporarily narrowed to linux/amd64
# only. The full linux/arm64 + darwin/arm64 + windows/amd64 matrix depends on
# `internal/nvr/ai` being buildable under both `CGO_ENABLED=0` (for cross
# compile) AND with cross toolchains for each target. Today `internal/nvr/ai/
# detector.go` and `embedder.go` unconditionally import
# `github.com/yalue/onnxruntime_go`, which is a cgo-only package. With
# `CGO_ENABLED=0` the build fails with:
#   "github.com/yalue/onnxruntime_go: build constraints exclude all Go files"
# and with `CGO_ENABLED=1` cross-compiling to darwin/windows/arm64 from an
# ubuntu runner requires cross toolchains we do not install here.
# Restoring the full matrix is tracked separately — lead-ai owns adding
# `//go:build cgo` guards + no-op stubs to internal/nvr/ai so non-cgo builds
# can succeed; lead-sre will then re-expand the matrix with cross toolchains
# (or native macos/windows runners) behind that fix.
#
# This workflow only builds — it does not push, sign, or release.

name: build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
  workflow_call:
    outputs:
      version:
        description: "Resolved build version (git tag or short SHA)"
        value: ${{ jobs.build.outputs.version }}

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        # Narrowed to linux/amd64 only — see MATRIX NOTE in header.
        include:
          - goos: linux
            goarch: amd64
            ext: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history is required so `git describe` and -buildvcs can stamp
          # the binary correctly.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Resolve build version
        id: version
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="$(git describe --tags --always --dirty 2>/dev/null || echo dev)"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Resolved version: ${VERSION}"

      - name: Reproducible build environment
        run: |
          # Pin SOURCE_DATE_EPOCH to the commit timestamp so any embedded
          # timestamps are deterministic across rebuilds of the same commit.
          SOURCE_DATE_EPOCH="$(git log -1 --pretty=%ct)"
          echo "SOURCE_DATE_EPOCH=${SOURCE_DATE_EPOCH}" >> "${GITHUB_ENV}"
          # CGO is required because internal/nvr/ai pulls in onnxruntime_go,
          # which is a cgo-only package. Follow-up (lead-ai): add //go:build cgo
          # guards + no-op stubs to internal/nvr/ai so CGO_ENABLED=0 builds work
          # again; then this can flip back and the matrix can re-expand.
          echo "CGO_ENABLED=1" >> "${GITHUB_ENV}"
          # Make module download deterministic.
          echo "GOFLAGS=-mod=readonly" >> "${GITHUB_ENV}"

      - name: Generate embedded assets
        # Required: internal/core embeds VERSION and internal/servers/hls
        # embeds hls.min.js — both are produced by `go generate`. Skipping
        # this step makes `go build` fail with "pattern ...: no matching files".
        # Run with the host toolchain (no GOOS/GOARCH) so the generators
        # themselves are built for the runner.
        run: go generate ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p dist
          OUT="dist/mediamtx_${{ steps.version.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}"

          # Reproducible build flags:
          #   -trimpath           : strip absolute paths from the binary
          #   -buildvcs=true      : embed deterministic VCS stamping (commit, dirty)
          #   -ldflags=-s -w      : strip symbol/debug tables (deterministic)
          #   -ldflags=-buildid=  : zero out the build ID for byte-identical output
          #   -ldflags=-X main.Version=...:
          #                         set the version string from the resolved tag.
          #                         NOTE: main.go currently has no exported Version
          #                         var; the linker will silently no-op the -X
          #                         flag in that case. Once main.go declares
          #                         `var Version string`, this will start
          #                         populating it. We keep the flag now so the
          #                         pipeline is forward-compatible.
          go build \
            -trimpath \
            -buildvcs=true \
            -tags enable_upgrade \
            -ldflags "-s -w -buildid= -X main.Version=${{ steps.version.outputs.version }}" \
            -o "${OUT}" \
            .

          ls -la "${OUT}"
          sha256sum "${OUT}" | tee "${OUT}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: mediamtx_${{ steps.version.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}
          path: |
            dist/*
          if-no-files-found: error
          retention-days: 14
