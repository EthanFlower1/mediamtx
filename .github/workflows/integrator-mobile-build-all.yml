# KAI-354 — Fan-out dispatcher for per-integrator mobile builds.
#
# Reads whitelabel/integrators/*.json and dispatches one
# integrator-mobile-build run per integrator. This is how "parallel per
# integrator" is achieved: GitHub Actions schedules the reusable workflow calls
# concurrently, limited only by runner availability.
#
# Triggers:
#   * push to main touching clients/flutter/** or whitelabel/integrators/**
#   * manual workflow_dispatch
#   * release published (rebuild-on-release)
#
# DRAFT — blocked on KAI-353 / KAI-355. See docs/designs/kai-354-mobile-build-pipeline.md.

name: integrator-mobile-build-all

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build"
        required: false
        type: string
        default: ""
  push:
    branches: [main]
    paths:
      - "clients/flutter/**"
      - "whitelabel/integrators/**"
      - ".github/workflows/integrator-mobile-build.yml"
      - ".github/workflows/integrator-mobile-build-all.yml"
  release:
    types: [published]

permissions:
  contents: read
  actions: write

jobs:
  discover:
    name: discover integrators
    runs-on: ubuntu-24.04
    outputs:
      integrators: ${{ steps.list.outputs.integrators }}
      count: ${{ steps.list.outputs.count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Enumerate integrator manifests
        id: list
        run: |
          set -euo pipefail
          mkdir -p whitelabel/integrators
          # Build a JSON array of integrator IDs from every manifest file.
          ids=$(
            find whitelabel/integrators -maxdepth 1 -type f -name '*.json' \
              -exec jq -r '.id' {} \; \
              | sort -u \
              | jq -R . | jq -s .
          )
          if [[ -z "${ids}" || "${ids}" == "[]" ]]; then
            echo "::warning::no integrator manifests found — nothing to build"
            echo "integrators=[]" >> "${GITHUB_OUTPUT}"
            echo "count=0"        >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "integrators=${ids}" >> "${GITHUB_OUTPUT}"
          echo "count=$(echo "${ids}" | jq 'length')" >> "${GITHUB_OUTPUT}"
          echo "Discovered integrators:"
          echo "${ids}" | jq -r '.[]'

  fan-out:
    name: build ${{ matrix.integrator_id }}
    needs: discover
    if: needs.discover.outputs.count != '0'
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        integrator_id: ${{ fromJson(needs.discover.outputs.integrators) }}
    uses: ./.github/workflows/integrator-mobile-build.yml
    with:
      integrator_id: ${{ matrix.integrator_id }}
      ref: ${{ inputs.ref || github.sha }}
      # On release, always upload. On main pushes, also upload. On manual
      # dispatch this workflow has no per-run skip toggle; use the single
      # integrator-mobile-build.yml workflow for that.
      skip_upload: false
    secrets: inherit
