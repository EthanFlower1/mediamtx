# KAI-354 — Per-integrator mobile app build pipeline
#
# Produces signed iOS (.ipa) and Android (.aab) artifacts for a single
# integrator, driven by a brand manifest in whitelabel/integrators/<id>.json.
#
# This workflow is the unit of parallelism: the companion
# integrator-mobile-build-all.yml fan-out workflow invokes this workflow once
# per integrator on every push to clients/flutter/**.
#
# DRAFT STATUS (blocking TODOs before ready-for-review):
#   * KAI-353 — brand config schema loader (currently stubbed via fixture JSON)
#   * KAI-355 — per-integrator credential vault (Apple API key, Play JSON,
#               Fastlane match repo, Android keystore). Every `# TODO(KAI-355)`
#               below must be replaced with a real secret injection step.
#   * Fastlane lanes themselves are scaffolded — see
#     clients/flutter/ios/fastlane/Fastfile and android/fastlane/Fastfile.

name: integrator-mobile-build

on:
  workflow_dispatch:
    inputs:
      integrator_id:
        description: "Integrator ID (matches whitelabel/integrators/<id>.json)"
        required: true
        type: string
      ref:
        description: "Git ref (branch, tag, or SHA) to build"
        required: false
        type: string
        default: ""
      skip_upload:
        description: "Skip TestFlight/Play upload (artifacts only)"
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      integrator_id:
        required: true
        type: string
      ref:
        required: false
        type: string
        default: ""
      skip_upload:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  # Serialize builds per integrator to avoid TestFlight/Play version clashes,
  # but allow different integrators to build in parallel.
  group: integrator-mobile-build-${{ inputs.integrator_id }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: "3.24.3"
  INTEGRATOR_ID: ${{ inputs.integrator_id }}
  MANIFEST_PATH: whitelabel/integrators/${{ inputs.integrator_id }}.json

jobs:
  resolve-manifest:
    name: resolve manifest (${{ inputs.integrator_id }})
    runs-on: ubuntu-24.04
    outputs:
      bundle_id: ${{ steps.parse.outputs.bundle_id }}
      app_name: ${{ steps.parse.outputs.app_name }}
      version_name: ${{ steps.parse.outputs.version_name }}
      version_code: ${{ steps.parse.outputs.version_code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Validate manifest exists
        run: |
          set -euo pipefail
          if [[ ! -f "${MANIFEST_PATH}" ]]; then
            echo "::error::Manifest not found: ${MANIFEST_PATH}"
            echo "Available integrators:"
            ls -1 whitelabel/integrators/*.json 2>/dev/null || echo "  (none)"
            exit 1
          fi
          python3 -c "import json; json.load(open('${MANIFEST_PATH}'))"

      - name: Parse manifest
        id: parse
        run: |
          set -euo pipefail
          # TODO(KAI-353): replace with `internal/cloud/whitelabel` CLI tool
          # once the brand config loader lands. For now we jq the fixture.
          BUNDLE_ID=$(jq -r '.bundleId' "${MANIFEST_PATH}")
          APP_NAME=$(jq -r '.appName' "${MANIFEST_PATH}")
          VERSION_NAME=$(jq -r '.version.name' "${MANIFEST_PATH}")
          VERSION_CODE=$(jq -r '.version.code' "${MANIFEST_PATH}")
          echo "bundle_id=${BUNDLE_ID}" >> "${GITHUB_OUTPUT}"
          echo "app_name=${APP_NAME}"   >> "${GITHUB_OUTPUT}"
          echo "version_name=${VERSION_NAME}" >> "${GITHUB_OUTPUT}"
          echo "version_code=${VERSION_CODE}" >> "${GITHUB_OUTPUT}"
          echo "Resolved ${APP_NAME} (${BUNDLE_ID}) v${VERSION_NAME}+${VERSION_CODE}"

  build-ios:
    name: iOS (${{ inputs.integrator_id }})
    needs: resolve-manifest
    runs-on: macos-14
    timeout-minutes: 60
    env:
      BUNDLE_ID:    ${{ needs.resolve-manifest.outputs.bundle_id }}
      APP_NAME:     ${{ needs.resolve-manifest.outputs.app_name }}
      VERSION_NAME: ${{ needs.resolve-manifest.outputs.version_name }}
      VERSION_CODE: ${{ needs.resolve-manifest.outputs.version_code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Set up Ruby (for Fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: clients/flutter/ios

      - name: Apply brand manifest to iOS project
        working-directory: clients/flutter
        run: |
          set -euo pipefail
          # TODO(KAI-353): replace with brand config loader that rewrites
          # Info.plist, asset catalogs, splash, icon, strings, colors from the
          # manifest. For now we only set the bundle identifier + display name.
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier ${BUNDLE_ID}" ios/Runner/Info.plist || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName ${APP_NAME}" ios/Runner/Info.plist || true
          echo "Applied stub branding for ${APP_NAME} (${BUNDLE_ID})"

      - name: Fastlane match — fetch signing certs
        working-directory: clients/flutter/ios
        env:
          # TODO(KAI-355): inject per-integrator Match credentials from vault.
          MATCH_PASSWORD:           ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APP_STORE_CONNECT_API_KEY_ID:          ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID:   ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY:         ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
        run: |
          echo "# TODO(KAI-355): run 'bundle exec fastlane match appstore --readonly' with per-integrator repo"
          echo "Skipping match fetch in draft scaffold"

      - name: Flutter pub get
        working-directory: clients/flutter
        run: flutter pub get

      - name: Build iOS IPA
        working-directory: clients/flutter
        run: |
          set -euo pipefail
          flutter build ipa \
            --release \
            --flavor integrator \
            --build-name="${VERSION_NAME}" \
            --build-number="${VERSION_CODE}" \
            --dart-define=INTEGRATOR_ID="${INTEGRATOR_ID}" \
            --dart-define=BRAND_MANIFEST_PATH="../../${MANIFEST_PATH}" \
            --export-options-plist=ios/ExportOptions.plist || {
              echo "::warning::flutter build ipa failed — expected in draft until KAI-355 provides signing"
              mkdir -p build/ios/ipa
              echo "draft" > build/ios/ipa/${INTEGRATOR_ID}.ipa
            }

      - name: Fastlane pilot — upload to TestFlight
        if: ${{ inputs.skip_upload != true }}
        working-directory: clients/flutter/ios
        env:
          # TODO(KAI-355): inject per-integrator App Store Connect API key.
          APP_STORE_CONNECT_API_KEY_ID:        ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY:       ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
          INTEGRATOR_ID:                       ${{ env.INTEGRATOR_ID }}
          BUNDLE_ID:                           ${{ env.BUNDLE_ID }}
        run: |
          echo "# TODO(KAI-355): bundle exec fastlane ios ios_integrator_release"
          echo "Skipping TestFlight upload in draft scaffold"

      - name: Upload iOS artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.integrator_id }}-ios-${{ github.run_id }}
          path: |
            clients/flutter/build/ios/ipa/*.ipa
            clients/flutter/build/ios/archive/*.xcarchive/dSYMs/**
            clients/flutter/ios/fastlane/report.xml
          retention-days: 30
          if-no-files-found: warn

  build-android:
    name: Android (${{ inputs.integrator_id }})
    needs: resolve-manifest
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      BUNDLE_ID:    ${{ needs.resolve-manifest.outputs.bundle_id }}
      APP_NAME:     ${{ needs.resolve-manifest.outputs.app_name }}
      VERSION_NAME: ${{ needs.resolve-manifest.outputs.version_name }}
      VERSION_CODE: ${{ needs.resolve-manifest.outputs.version_code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Set up Ruby (for Fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: clients/flutter/android

      - name: Apply brand manifest to Android project
        working-directory: clients/flutter
        run: |
          set -euo pipefail
          # TODO(KAI-353): replace with brand config loader that rewrites
          # AndroidManifest.xml applicationId, labels, icons, splash, colors.
          echo "Applied stub branding for ${APP_NAME} (${BUNDLE_ID})"

      - name: Decode Android keystore
        env:
          # TODO(KAI-355): inject per-integrator keystore (base64) + passwords.
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: clients/flutter/android
        run: |
          set -euo pipefail
          # TODO(KAI-355): decode base64 keystore and write key.properties
          mkdir -p app
          cat > key.properties <<EOF
          storeFile=../app/keystore.jks
          storePassword=TODO_KAI_355
          keyAlias=TODO_KAI_355
          keyPassword=TODO_KAI_355
          EOF
          echo "# TODO(KAI-355): replace with real decoded keystore"

      - name: Flutter pub get
        working-directory: clients/flutter
        run: flutter pub get

      - name: Build Android AAB
        working-directory: clients/flutter
        run: |
          set -euo pipefail
          flutter build appbundle \
            --release \
            --flavor integrator \
            --build-name="${VERSION_NAME}" \
            --build-number="${VERSION_CODE}" \
            --dart-define=INTEGRATOR_ID="${INTEGRATOR_ID}" \
            --dart-define=BRAND_MANIFEST_PATH="../../${MANIFEST_PATH}" \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols || {
              echo "::warning::flutter build appbundle failed — expected in draft until KAI-355 provides signing"
              mkdir -p build/app/outputs/bundle/integratorRelease
              echo "draft" > build/app/outputs/bundle/integratorRelease/${INTEGRATOR_ID}.aab
              mkdir -p build/app/outputs/mapping/integratorRelease
              echo "draft" > build/app/outputs/mapping/integratorRelease/mapping.txt
            }

      - name: Fastlane supply — upload to Play internal track
        if: ${{ inputs.skip_upload != true }}
        working-directory: clients/flutter/android
        env:
          # TODO(KAI-355): inject per-integrator Play Service Account JSON.
          SUPPLY_JSON_KEY_DATA: ${{ secrets.SUPPLY_JSON_KEY_DATA }}
          INTEGRATOR_ID:        ${{ env.INTEGRATOR_ID }}
          BUNDLE_ID:            ${{ env.BUNDLE_ID }}
        run: |
          echo "# TODO(KAI-355): bundle exec fastlane android android_integrator_release"
          echo "Skipping Play upload in draft scaffold"

      - name: Upload Android artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.integrator_id }}-android-${{ github.run_id }}
          path: |
            clients/flutter/build/app/outputs/bundle/**/*.aab
            clients/flutter/build/app/outputs/mapping/**/mapping.txt
            clients/flutter/build/app/outputs/symbols/**
            clients/flutter/android/fastlane/report.xml
          retention-days: 30
          if-no-files-found: warn

  notify-status:
    name: notify integrator portal
    if: always()
    needs: [resolve-manifest, build-ios, build-android]
    runs-on: ubuntu-24.04
    steps:
      - name: Post build status webhook
        env:
          # TODO(KAI-355): wire INTEGRATOR_PORTAL_WEBHOOK secret from vault.
          INTEGRATOR_PORTAL_WEBHOOK: ${{ secrets.INTEGRATOR_PORTAL_WEBHOOK }}
          INTEGRATOR_ID: ${{ inputs.integrator_id }}
          IOS_STATUS:    ${{ needs.build-ios.result }}
          ANDROID_STATUS: ${{ needs.build-android.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [[ -z "${INTEGRATOR_PORTAL_WEBHOOK:-}" ]]; then
            echo "# TODO(KAI-355): INTEGRATOR_PORTAL_WEBHOOK not configured, skipping notify"
            exit 0
          fi
          payload=$(jq -n \
            --arg id "${INTEGRATOR_ID}" \
            --arg ios "${IOS_STATUS}" \
            --arg android "${ANDROID_STATUS}" \
            --arg run "${RUN_URL}" \
            '{integratorId:$id, ios:$ios, android:$android, runUrl:$run}')
          curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -d "${payload}" \
            "${INTEGRATOR_PORTAL_WEBHOOK}" || echo "::warning::webhook post failed"
