# KAI-231: Terraform fmt + validate CI for all environments.
# This workflow runs on every PR that touches infra/ and on pushes to main.
# No AWS credentials are needed for validate — it uses -backend=false.
# Actual plan/apply runs are gated behind KAI-232 (CI/CD pipeline).

name: terraform

on:
  pull_request:
    paths:
      - "infra/**"
  push:
    branches:
      - main
    paths:
      - "infra/**"

env:
  TF_VERSION: "1.5.7"

jobs:
  fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: fmt check (recursive)
        working-directory: infra
        run: terraform fmt -check -recursive

  validate-production-region:
    name: validate production/regions/us-east-2
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: init (no backend)
        working-directory: infra/environments/production/regions/us-east-2
        run: terraform init -backend=false

      - name: validate
        working-directory: infra/environments/production/regions/us-east-2
        run: terraform validate
        env:
          # validate needs a placeholder — never a real account ID in CI env
          TF_VAR_aws_account_id: "000000000000"

  validate-production-global:
    name: validate production/global
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: init (no backend)
        working-directory: infra/environments/production/global
        run: terraform init -backend=false

      - name: validate
        working-directory: infra/environments/production/global
        run: terraform validate
        env:
          TF_VAR_aws_account_id: "000000000000"
          TF_VAR_root_domain: "example.com"

  validate-staging-region:
    name: validate staging/regions/us-east-2
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: init (no backend)
        working-directory: infra/environments/staging/regions/us-east-2
        run: terraform init -backend=false

      - name: validate
        working-directory: infra/environments/staging/regions/us-east-2
        run: terraform validate
        env:
          TF_VAR_aws_account_id: "000000000000"

  validate-staging-global:
    name: validate staging/global
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: init (no backend)
        working-directory: infra/environments/staging/global
        run: terraform init -backend=false

      - name: validate
        working-directory: infra/environments/staging/global
        run: terraform validate
        env:
          TF_VAR_aws_account_id: "000000000000"
          TF_VAR_root_domain: "example.com"

  validate-dev-region:
    name: validate dev/regions/us-east-2
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: init (no backend)
        working-directory: infra/environments/dev/regions/us-east-2
        run: terraform init -backend=false

      - name: validate
        working-directory: infra/environments/dev/regions/us-east-2
        run: terraform validate
        env:
          TF_VAR_aws_account_id: "000000000000"

  validate-dev-global:
    name: validate dev/global
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: init (no backend)
        working-directory: infra/environments/dev/global
        run: terraform init -backend=false

      - name: validate
        working-directory: infra/environments/dev/global
        run: terraform validate
        env:
          TF_VAR_aws_account_id: "000000000000"
          TF_VAR_root_domain: "example.com"
