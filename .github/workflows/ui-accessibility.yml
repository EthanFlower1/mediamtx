name: UI Accessibility (WCAG 2.1 AA)

on:
  push:
    paths:
      - 'ui/**'
  pull_request:
    paths:
      - 'ui/**'

defaults:
  run:
    working-directory: ui

jobs:
  axe-unit-tests:
    name: axe-core unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - run: npm ci

      - name: Run accessibility unit tests
        run: npm test -- --reporter=verbose

      - name: Fail on critical/serious violations
        if: failure()
        run: |
          echo "::error::axe-core detected WCAG 2.1 AA violations. Fix all critical and serious issues before merging."
          exit 1

  playwright-a11y:
    name: Playwright keyboard & axe e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright accessibility tests
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-a11y-report
          path: ui/playwright-report/
          retention-days: 14
