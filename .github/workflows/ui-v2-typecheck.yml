# KAI-432: TypeScript type-check gate for ui-v2
#
# This workflow is a REQUIRED STATUS CHECK — it must pass before any PR
# touching ui-v2/ can be merged. Configure it as required in:
#   GitHub → Settings → Branches → Branch protection rules → "main"
#   → "Require status checks to pass before merging"
#   → Add: "typecheck (ui-v2)"
#
# Rationale: the React codebase (KAI-307 scaffold) had pre-existing lint
# and type drift from parallel feature work. This gate prevents silent
# accumulation of further TS errors across the integrator portal,
# customer admin, and on-prem embed contexts.

name: typecheck (ui-v2)

on:
  push:
    paths:
      - 'ui-v2/**'
      - '.github/workflows/ui-v2-typecheck.yml'
  pull_request:
    paths:
      - 'ui-v2/**'
      - '.github/workflows/ui-v2-typecheck.yml'

jobs:
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui-v2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'ui-v2/.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'ui-v2/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck
