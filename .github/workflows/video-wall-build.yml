name: video-wall build

# Wave 1 CI matrix for the Kaivue Video Wall (Qt 6 / C++).
#
# Targets:
#   - Linux:   ubuntu-22.04 + GCC 12
#   - Windows: windows-2022 + MSVC 2022
#
# Notes:
#   - vcpkg builds Qt 6 from source on a cold cache (~30-90 min). We rely on
#     actions/cache + the vcpkg binary cache to keep warm builds well under
#     CI budget. The first run on a new self-hosted-equivalent cache will be
#     slow; that's expected and acceptable for Wave 1 scaffold.
#   - macOS is intentionally deferred (see video-wall/README.md).
#   - This workflow only runs when files under video-wall/ or this workflow
#     itself change, to keep the rest of the monorepo CI fast.

on:
  push:
    branches: [main]
    paths:
      - 'video-wall/**'
      - '.github/workflows/video-wall-build.yml'
  pull_request:
    paths:
      - 'video-wall/**'
      - '.github/workflows/video-wall-build.yml'
  workflow_dispatch:

concurrency:
  group: video-wall-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-gcc12
            os: ubuntu-22.04
            triplet: x64-linux
            generator: Ninja
            cmake_extra: ''
            artifact_path: video-wall/build/KaivueVideoWall
          - name: windows-msvc2022
            os: windows-2022
            triplet: x64-windows
            generator: 'Visual Studio 17 2022'
            cmake_extra: '-A x64'
            artifact_path: video-wall/build/Release/KaivueVideoWall.exe

    env:
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}
      VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export GitHub Actions cache vars (vcpkg binary cache)
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            libgl1-mesa-dev libxkbcommon-dev libfontconfig1-dev \
            libxcb1-dev libxcb-icccm4-dev libxcb-image0-dev \
            libxcb-keysyms1-dev libxcb-randr0-dev libxcb-render-util0-dev \
            libxcb-shape0-dev libxcb-sync-dev libxcb-xfixes0-dev \
            libxcb-xinerama0-dev libxcb-xkb-dev libx11-xcb-dev \
            libglu1-mesa-dev

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$HOME/vcpkg"
          if [ "$RUNNER_OS" = "Windows" ]; then
            "$HOME/vcpkg/bootstrap-vcpkg.bat" -disableMetrics
          else
            "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          fi
          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"

      - name: Configure
        shell: bash
        working-directory: video-wall
        run: |
          cmake -B build -G "${{ matrix.generator }}" ${{ matrix.cmake_extra }} \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: bash
        working-directory: video-wall
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KaivueVideoWall-${{ matrix.name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: warn
          retention-days: 14
