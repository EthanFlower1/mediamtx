version: "2"

linters:
  enable:
  - asciicheck
  - bidichk
  - bodyclose
  - copyloopvar
  - depguard
  - dupl
  - errorlint
  - gochecknoinits
  - gocritic
  - lll
  - misspell
  - modernize
  - nilerr
  - prealloc
  - predeclared
  - reassign
  - revive
  - usestdlibvars
  - unconvert
  - tparallel
  - wastedassign
  - whitespace

  exclusions:
    paths:
      - cmd/backfill

  settings:
    # ----------------------------------------------------------------------
    # KAI-236: role-package import boundaries.
    #
    # The Kaivue Recording Server is split into three role-scoped package
    # trees under internal/. depguard enforces that the two role packages
    # never import each other directly; the only sanctioned crossing point
    # is internal/shared/... (types, protos, certmgr, sidecar, etc.).
    #
    #   internal/directory/... <-/-> internal/recorder/...
    #            \                          /
    #             +--> internal/shared <---+
    #
    # Cross-role communication MUST go through the Connect-Go services in
    # internal/shared/proto. See docs/architecture/package-layout.md and
    # internal/README.md.
    # ----------------------------------------------------------------------
    depguard:
      rules:
        directory-no-recorder:
          list-mode: lax
          files:
          - "**/internal/directory/**/*.go"
          deny:
          - pkg: github.com/bluenviron/mediamtx/internal/recorder
            desc: >-
              KAI-236: internal/directory must not import internal/recorder.
              Cross-role calls must go through internal/shared/proto
              Connect-Go services.
        recorder-no-directory:
          list-mode: lax
          files:
          - "**/internal/recorder/**/*.go"
          deny:
          - pkg: github.com/bluenviron/mediamtx/internal/directory
            desc: >-
              KAI-236: internal/recorder must not import internal/directory.
              Cross-role calls must go through internal/shared/proto
              Connect-Go services.
        shared-is-leaf:
          list-mode: lax
          files:
          - "**/internal/shared/**/*.go"
          deny:
          - pkg: github.com/bluenviron/mediamtx/internal/directory
            desc: >-
              KAI-236: internal/shared is a leaf with respect to role
              packages and must not import internal/directory.
          - pkg: github.com/bluenviron/mediamtx/internal/recorder
            desc: >-
              KAI-236: internal/shared is a leaf with respect to role
              packages and must not import internal/recorder.
        # ----------------------------------------------------------------
        # Seam #2b: legacydb deprecation guard.
        #
        # internal/shared/legacydb is a TRANSITIONAL package containing
        # the monolithic NVR database schema (formerly internal/nvr/db).
        # New code must use internal/directory/db or internal/recorder/db.
        # This rule blocks NEW packages from importing legacydb. Existing
        # importers are permitted via the allow list below while the DB
        # split (Phase 3) is completed.
        #
        # When all tables have been migrated, remove legacydb entirely.
        # ----------------------------------------------------------------
        # NOTE: legacydb-deprecation is informational — it uses lax mode
        # so existing importers are not blocked. Remove the deny list once
        # migration is complete.

        # ----------------------------------------------------------------
        # Seam #3: Zitadel IdentityProvider firewall.
        #
        # The Zitadel adapter lives exclusively in
        # internal/shared/auth/zitadel/. No other package may import
        # Zitadel SDK types directly. All identity consumption goes
        # through internal/shared/auth.IdentityProvider.
        # ----------------------------------------------------------------
        zitadel-firewall:
          list-mode: lax
          files:
          - "**/*.go"
          - "!**/internal/shared/auth/zitadel/**/*.go"
          deny:
          - pkg: github.com/zitadel/zitadel-go
            desc: >-
              Seam #3: Zitadel SDK imports are only permitted inside
              internal/shared/auth/zitadel/. Consume identity through
              the auth.IdentityProvider interface instead.

    errcheck:
      exclude-functions:
      - io.Copy
      - (io.Closer).Close
      - (io.Writer).Write
      - (hash.Hash).Write
      - (net.Conn).Close
      - (net.Conn).SetReadDeadline
      - (net.Conn).SetWriteDeadline
      - (*net.TCPConn).SetKeepAlive
      - (*net.TCPConn).SetKeepAlivePeriod
      - (*net.TCPConn).SetNoDelay
      - (net.Listener).Close
      - (net.PacketConn).Close
      - (net.PacketConn).SetReadDeadline
      - (net.PacketConn).SetWriteDeadline
      - (net/http.ResponseWriter).Write
      - (*net/http.Server).Serve
      - (*net/http.Server).ServeTLS
      - (*net/http.Server).Shutdown
      - os.Chdir
      - os.Mkdir
      - os.MkdirAll
      - os.Remove
      - os.RemoveAll
      - os.Setenv
      - os.Unsetenv
      - (*os.File).WriteString
      - (*os.File).Close
      - (github.com/datarhei/gosrt.Conn).Close
      - (github.com/datarhei/gosrt.Conn).SetReadDeadline
      - (github.com/datarhei/gosrt.Conn).SetWriteDeadline
      - (*github.com/bluenviron/gortsplib/v5.Client).Close
      - (*github.com/bluenviron/gortsplib/v5.Server).Close
      - (*github.com/bluenviron/gortsplib/v5.ServerSession).Close
      - (*github.com/bluenviron/gortsplib/v5.ServerStream).Close
      - (*github.com/bluenviron/gortsplib/v5.ServerConn).Close

    govet:
      enable-all: true
      disable:
      - fieldalignment
      - reflectvaluecompare
      settings:
        shadow:
          strict: true

    modernize:
      disable:
      - reflecttypefor
      - stringsbuilder
      - testingcontext

formatters:
  enable:
  - gofmt
  - gofumpt
  - goimports
