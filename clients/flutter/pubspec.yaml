name: nvr_client
description: MediaMTX NVR cross-platform client
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  go_router: ^14.0.0
  dio: ^5.4.0
  web_socket_channel: ^2.4.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.8.0
  flutter_webrtc: ^0.12.0
  media_kit: ^1.1.0
  media_kit_video: ^1.2.0
  media_kit_libs_video: ^1.0.0
  fvp: ^0.35.2
  video_player: ^2.11.1
  http: ^1.6.0
  fl_chart: ^0.69.2
  share_plus: ^10.1.4
  path_provider: ^2.1.0
  # KAI-296 — discovery flow.
  # `multicast_dns` is used for LAN browsing. It is no-op on web and unreliable
  # on some desktop configurations; MdnsDiscovery.isSupported gates usage.
  multicast_dns: ^0.3.2
  # `mobile_scanner` provides the QR code camera view on iOS/Android/macOS.
  # Desktop Linux/Windows and web degrade to manual entry.
  mobile_scanner: ^5.0.0
  # KAI-297 — login flow. `flutter_appauth` drives OIDC SSO with PKCE + the
  # `kaivue://auth/callback` custom URL scheme on iOS and Android. The client-
  # facing interface is abstracted behind `SsoAuthorizer` so tests can swap in
  # a fake without pulling the platform plugin into the Dart test VM.
  flutter_appauth: ^8.0.0
  # KAI-300 — live view. Keep screen awake while streaming.
  # image_gallery_saver and permission_handler deferred to a follow-up
  # once client-side frame capture is added (server-side screenshot used now).
  wakelock_plus: ^1.2.0
  # KAI-298 — background token refresh.
  # `workmanager` drives the Android periodic task. The iOS BGTaskScheduler
  # integration uses native Swift (AppDelegate.swift) + a method channel stub;
  # no Dart-side iOS plugin is added here to keep the dependency graph small.
  # Desktop and Web fall back to the foreground Timer.periodic path.
  workmanager: ^0.5.2
  # KAI-303 — push notifications scaffold.
  # firebase_messaging drives APNs + FCM (we do NOT init Firebase in this
  # PR — actual init waits for google-services config to land in a
  # separate credential-landing PR). flutter_local_notifications presents
  # the in-app banner + OS notification on receipt.
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3
  # KAI-431 — Dart protobuf runtime for generated .pb.dart message classes.
  # The code in lib/src/gen/proto/ is generated by buf + protoc-gen-dart;
  # run scripts/buf-gen-dart.sh to regenerate.
  protobuf: ^3.1.0
  # gRPC for service stubs (Connect-Go compatible via grpc-web transport).
  grpc: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  fake_async: ^1.3.1
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0
  riverpod_generator: ^2.3.0
  mockito: ^5.4.0
  http_mock_adapter: ^0.6.0

flutter:
  uses-material-design: true

  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
    - family: IBMPlexSans
      fonts:
        - asset: assets/fonts/IBMPlexSans-Light.ttf
          weight: 300
        - asset: assets/fonts/IBMPlexSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexSans-Bold.ttf
          weight: 700
