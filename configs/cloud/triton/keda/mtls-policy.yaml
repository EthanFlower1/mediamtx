# KAI-277: mTLS policy for inference traffic.
# Enforces mutual TLS between all services in the ml-inference namespace
# via Istio PeerAuthentication and DestinationRule.

---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: ml-inference-mtls
  namespace: ml-inference
  labels:
    kaivue.io/component: ml-inference
    kaivue.io/ticket: KAI-277
spec:
  mtls:
    mode: STRICT

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: triton-inference-mtls
  namespace: ml-inference
  labels:
    kaivue.io/component: ml-inference
    kaivue.io/ticket: KAI-277
spec:
  host: triton-inference.ml-inference.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      http:
        h2UpgradePolicy: UPGRADE
      tcp:
        maxConnections: 100
    loadBalancer:
      simple: LEAST_REQUEST

---
# Per-tenant request routing via VirtualService.
# The x-kaivue-tenant-id header is injected by the API gateway and used
# to route requests to tenant-specific model versions when available.
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: triton-tenant-routing
  namespace: ml-inference
  labels:
    kaivue.io/component: ml-inference
    kaivue.io/ticket: KAI-277
spec:
  hosts:
    - triton-inference.ml-inference.svc.cluster.local
  http:
    # Tenant-specific route: if header present, route to tenant-tagged subset.
    - match:
        - headers:
            x-kaivue-tenant-id:
              regex: ".+"
      route:
        - destination:
            host: triton-inference.ml-inference.svc.cluster.local
            port:
              number: 8001
      headers:
        request:
          set:
            x-envoy-retry-on: "5xx,reset,connect-failure"
            x-envoy-max-retries: "2"
      retries:
        attempts: 2
        perTryTimeout: 30s
        retryOn: "5xx,reset,connect-failure"
    # Default route: no tenant header.
    - route:
        - destination:
            host: triton-inference.ml-inference.svc.cluster.local
            port:
              number: 8001
      retries:
        attempts: 2
        perTryTimeout: 30s

---
# AuthorizationPolicy: only allow traffic from known namespaces.
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: triton-inference-authz
  namespace: ml-inference
  labels:
    kaivue.io/component: ml-inference
    kaivue.io/ticket: KAI-277
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces:
              - kaivue-api
              - ml-inference
              - monitoring
      to:
        - operation:
            ports: ["8000", "8001", "8002"]
