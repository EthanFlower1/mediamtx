  scaleTargetRef:
    name: triton-inference
  pollingInterval: 30
  cooldownPeriod: 900
  idleReplicaCount: 0
  minReplicaCount: 0
  maxReplicaCount: 2
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-server.monitoring.svc.cluster.local:9090
        metricName: nv_inference_queue_duration_us
        query: |
          sum(rate(nv_inference_request_success{model="person-reid"}[2m]))
        threshold: "3"
        activationThreshold: "1"
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-server.monitoring.svc.cluster.local:9090
        metricName: triton_queue_depth
        query: |
          sum(nv_inference_pending_request_count{model="person-reid"})
        threshold: "3"
        activationThreshold: "1"
  advanced:
    restoreToOriginalReplicaCount: false
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 60
          policies:
            - type: Pods
              value: 1
              periodSeconds: 120
        scaleDown:
          stabilizationWindowSeconds: 600
          policies:
            - type: Pods
              value: 1
              periodSeconds: 300
