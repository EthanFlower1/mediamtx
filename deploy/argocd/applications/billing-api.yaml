# KAI-232 — ArgoCD Application: billing-api
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: billing-api-dev
  namespace: argocd
  labels:
    kaivue.io/service: billing-api
    kaivue.io/env: dev
spec:
  project: kaivue-cloud
  source:
    repoURL: https://github.com/kaivue/infra-envs.git
    targetRevision: HEAD
    path: envs/dev/billing-api
  destination:
    server: https://kubernetes.default.svc
    namespace: kaivue-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: billing-api-staging
  namespace: argocd
  labels:
    kaivue.io/service: billing-api
    kaivue.io/env: staging
spec:
  project: kaivue-cloud
  source:
    repoURL: https://github.com/kaivue/infra-envs.git
    targetRevision: HEAD
    path: envs/staging/billing-api
  destination:
    server: https://kubernetes.default.svc
    namespace: kaivue-staging
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: billing-api-prod
  namespace: argocd
  labels:
    kaivue.io/service: billing-api
    kaivue.io/env: prod
spec:
  project: kaivue-cloud
  source:
    repoURL: https://github.com/kaivue/infra-envs.git
    targetRevision: HEAD
    path: envs/prod/billing-api
  destination:
    server: https://kubernetes.default.svc
    namespace: kaivue-prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
