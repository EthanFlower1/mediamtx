# KAI-232 — ArgoCD Application: notifications-worker
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notifications-worker-dev
  namespace: argocd
  labels:
    kaivue.io/service: notifications-worker
    kaivue.io/env: dev
spec:
  project: kaivue-cloud
  source:
    repoURL: https://github.com/kaivue/infra-envs.git
    targetRevision: HEAD
    path: envs/dev/notifications-worker
  destination:
    server: https://kubernetes.default.svc
    namespace: kaivue-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notifications-worker-staging
  namespace: argocd
  labels:
    kaivue.io/service: notifications-worker
    kaivue.io/env: staging
spec:
  project: kaivue-cloud
  source:
    repoURL: https://github.com/kaivue/infra-envs.git
    targetRevision: HEAD
    path: envs/staging/notifications-worker
  destination:
    server: https://kubernetes.default.svc
    namespace: kaivue-staging
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notifications-worker-prod
  namespace: argocd
  labels:
    kaivue.io/service: notifications-worker
    kaivue.io/env: prod
spec:
  project: kaivue-cloud
  source:
    repoURL: https://github.com/kaivue/infra-envs.git
    targetRevision: HEAD
    path: envs/prod/notifications-worker
  destination:
    server: https://kubernetes.default.svc
    namespace: kaivue-prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
