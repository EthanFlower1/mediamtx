# KAI-277: GPU NodePool for customer AI model inference (Triton).
# Selector: kaivue.io/workload=customer-models
# Uses g5.xlarge (NVIDIA A10G) for inference workloads.
# Applied via ArgoCD; lead-ai owns the workload scheduling.
apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: gpu-inference
spec:
  template:
    metadata:
      labels:
        kaivue.io/workload: customer-models
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["g5.xlarge", "g5.2xlarge", "g5.4xlarge"]
      nodeClassRef:
        name: gpu-inference
      taints:
        - key: nvidia.com/gpu
          effect: NoSchedule
  limits:
    cpu: "64"
    memory: 256Gi
  disruption:
    consolidationPolicy: WhenUnderutilized
    expireAfter: 720h
---
apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: gpu-inference
spec:
  amiFamily: AL2
  role: "${KARPENTER_NODE_ROLE}"
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "${CLUSTER_NAME}"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "${CLUSTER_NAME}"
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 100Gi
        volumeType: gp3
        deleteOnTermination: true
  tags:
    KAITicket: "KAI-277"
    ManagedBy: "karpenter"
    "kaivue.io/workload": "customer-models"
