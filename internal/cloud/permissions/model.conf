# Casbin model for MediaMTX cloud control plane (KAI-225).
#
# Subject formats (all strings, no structured types inside the model):
#   user:<user_id>@<tenant_id>                direct in-tenant identity
#   integrator:<user_id>@<customer_tenant_id> reseller staff acting on a customer
#   federation:<peer_directory_id>            federated peer tenant
#
# Object format:
#   <tenant_id>/<resource_type>/<resource_id>
#   tenant_id is MANDATORY so cross-tenant bleed is structurally impossible.
#   <resource_id> may be "*" to match any instance of the type.
#
# Actions are defined as Go constants in actions.go.
#
# Rules:
#   - Supports deny-override: any matching deny wins.
#   - g links subjects -> roles (e.g. "user:u1@tenant-A" -> "role:admin@tenant-A").
#   - keyMatch2 on obj supports "<tenant>/cameras/*" style wildcards.
#   - keyMatch2 on act supports "view.*" / "*" wildcards (admin gets "*").
#   - A subject may match a policy either directly (p.sub == r.sub) or via role.
#   - The Go enforcer layer adds the fail-closed default: missing policy = deny.

[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act, eft

[role_definition]
g = _, _

[policy_effect]
e = some(where (p_eft == allow)) && !some(where (p_eft == deny))

[matchers]
m = (r.sub == p.sub || g(r.sub, p.sub)) && keyMatch2(r.obj, p.obj) && keyMatch2(r.act, p.act)
