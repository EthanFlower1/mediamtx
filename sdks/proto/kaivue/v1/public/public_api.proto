  INTEGRATION_KIND_MQTT = 2;
  INTEGRATION_KIND_SYSLOG = 3;
  INTEGRATION_KIND_CUSTOM = 100;
}

message Integration {
  string id = 1;
  string name = 2;
  IntegrationKind kind = 3;
  bool enabled = 4;
  map<string, string> config = 5;
  repeated EventKind subscribed_events = 6;
  repeated string camera_ids = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message CreateIntegrationRequest {
  string name = 1;
  IntegrationKind kind = 2;
  map<string, string> config = 3;
  repeated EventKind subscribed_events = 4;
  repeated string camera_ids = 5;
}
message CreateIntegrationResponse { Integration integration = 1; }

message GetIntegrationRequest { string id = 1; }
message GetIntegrationResponse { Integration integration = 1; }

message UpdateIntegrationRequest {
  string id = 1;
  string name = 2;
  bool enabled = 3;
  map<string, string> config = 4;
  repeated EventKind subscribed_events = 5;
  repeated string camera_ids = 6;
  repeated string update_mask = 7;
}
message UpdateIntegrationResponse { Integration integration = 1; }

message DeleteIntegrationRequest { string id = 1; }
message DeleteIntegrationResponse {}

message ListIntegrationsRequest {
  IntegrationKind kind_filter = 1;
  int32 page_size = 2;
  string cursor = 3;
}

message ListIntegrationsResponse {
  repeated Integration integrations = 1;
  string next_cursor = 2;
}

message TestIntegrationRequest { string id = 1; }

message TestIntegrationResponse {
  bool success = 1;
  string message = 2;
  int64 latency_ms = 3;
}

// ============================================================================
// Services — 7 services, 33 methods total
// ============================================================================

service CameraService {
  rpc CreateCamera(CreateCameraRequest) returns (CreateCameraResponse);
  rpc GetCamera(GetCameraRequest) returns (GetCameraResponse);
  rpc UpdateCamera(UpdateCameraRequest) returns (UpdateCameraResponse);
  rpc DeleteCamera(DeleteCameraRequest) returns (DeleteCameraResponse);
  rpc ListCameras(ListCamerasRequest) returns (ListCamerasResponse);
}

service UserService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
}

service RecordingService {
  rpc GetRecording(GetRecordingRequest) returns (GetRecordingResponse);
  rpc ListRecordings(ListRecordingsRequest) returns (ListRecordingsResponse);
  rpc DeleteRecording(DeleteRecordingRequest) returns (DeleteRecordingResponse);
  rpc ExportRecording(ExportRecordingRequest) returns (ExportRecordingResponse);
}

service EventService {
  rpc GetEvent(GetEventRequest) returns (GetEventResponse);
  rpc ListEvents(ListEventsRequest) returns (ListEventsResponse);
  rpc AcknowledgeEvent(AcknowledgeEventRequest) returns (AcknowledgeEventResponse);
}

service ScheduleService {
  rpc CreateSchedule(CreateScheduleRequest) returns (CreateScheduleResponse);
  rpc GetSchedule(GetScheduleRequest) returns (GetScheduleResponse);
  rpc UpdateSchedule(UpdateScheduleRequest) returns (UpdateScheduleResponse);
  rpc DeleteSchedule(DeleteScheduleRequest) returns (DeleteScheduleResponse);
  rpc ListSchedules(ListSchedulesRequest) returns (ListSchedulesResponse);
}

service RetentionService {
  rpc CreateRetentionPolicy(CreateRetentionPolicyRequest) returns (CreateRetentionPolicyResponse);
  rpc GetRetentionPolicy(GetRetentionPolicyRequest) returns (GetRetentionPolicyResponse);
  rpc UpdateRetentionPolicy(UpdateRetentionPolicyRequest) returns (UpdateRetentionPolicyResponse);
  rpc DeleteRetentionPolicy(DeleteRetentionPolicyRequest) returns (DeleteRetentionPolicyResponse);
  rpc ListRetentionPolicies(ListRetentionPoliciesRequest) returns (ListRetentionPoliciesResponse);
  rpc ApplyRetentionPolicy(ApplyRetentionPolicyRequest) returns (ApplyRetentionPolicyResponse);
}

service IntegrationService {
  rpc CreateIntegration(CreateIntegrationRequest) returns (CreateIntegrationResponse);
  rpc GetIntegration(GetIntegrationRequest) returns (GetIntegrationResponse);
  rpc UpdateIntegration(UpdateIntegrationRequest) returns (UpdateIntegrationResponse);
  rpc DeleteIntegration(DeleteIntegrationRequest) returns (DeleteIntegrationResponse);
  rpc ListIntegrations(ListIntegrationsRequest) returns (ListIntegrationsResponse);
  rpc TestIntegration(TestIntegrationRequest) returns (TestIntegrationResponse);
}
