  string next_cursor = 2;
}

message ApplyRetentionPolicyRequest {
  string policy_id = 1;
  repeated string camera_ids = 2;
}
message ApplyRetentionPolicyResponse { RetentionPolicy policy = 1; }

// ============================================================================
